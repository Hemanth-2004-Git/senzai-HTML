<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SENZAI | AI Designed for Decisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   SENZAI Microsite — Pass 1
   Dark cinematic. Persistent 3D scene. Layered scroll.
   ============================================================ */

:root {
  /* Metallic Chic — enterprise AI palette */
  --mc-primary: #3D52A0;
  --mc-accent: #7091E6;
  --mc-muted: #8697C4;
  --mc-lavender: #ADBBD4;
  --mc-light: #EDE8F5;

  /* Brand — mapped for existing utilities */
  --senzai-navy: #1a2348;
  --senzai-blue: #3D52A0;
  --senzai-mid: #7091E6;
  --senzai-teal: #8697C4;
  --senzai-teal-bright: #ADBBD4;
  --senzai-gradient: linear-gradient(135deg, #1a2348 0%, #3D52A0 38%, #7091E6 72%, #ADBBD4 100%);
  --senzai-gradient-text: linear-gradient(135deg, #f0f3ff 0%, #7091E6 42%, #ADBBD4 100%);

  /* Surfaces — deep navy, metallic depth */
  --bg-0: #0a0e1a;
  --bg-1: #0e1326;
  --bg-2: #12182f;

  /* One continuous “smooth road” background (matches hero diagonal) */
  --page-bg-base: #0a0e1a;
  --page-bg-road: linear-gradient(152deg,
      #0a0e1a 0%,
      #0b0f16 14%,
      #0d1219 30%,
      #101722 46%,
      #151c28 60%,
      #182130 74%,
      #1a2534 88%,
      #1c2838 100%);
  --surf: rgba(26, 35, 72, 0.55);
  --surf-2: rgba(32, 42, 88, 0.65);
  --surf-3: rgba(40, 52, 98, 0.72);
  --glass: rgba(30, 40, 78, 0.38);
  --glass-strong: rgba(36, 48, 92, 0.55);
  --bdr: rgba(173, 187, 212, 0.14);
  --bdr-2: rgba(112, 145, 230, 0.28);
  --bdr-3: rgba(173, 187, 212, 0.42);

  /* Text */
  --text: #f4f6fd;
  --text-2: #9ba8c9;
  --text-3: #6d7a9a;

  /* CTA */
  --cta: #3D52A0;
  --cta-h: #7091E6;
  --cta-glow: rgba(112, 145, 230, 0.45);

  /* Status */
  --ok: #22C55E;
  --warn: #F59E0B;

  /* Type */
  --f-d: 'Space Grotesk', system-ui, sans-serif;
  --f-b: 'Inter', system-ui, sans-serif;
  --f-m: 'JetBrains Mono', ui-monospace, monospace;

  --container: 1180px;
  --pad: 32px;

  /* Synced from fixed nav height in App (fallback if JS not run) */
  --nav-scroll-offset: 80px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  min-height: 100%;
  /* Fallback for native hash navigation / new tab; synced with fixed nav via --nav-scroll-offset */
  scroll-padding-top: var(--nav-scroll-offset);
  background-color: var(--page-bg-base);
  background-image: var(--page-bg-road);
  background-repeat: no-repeat;
  background-size: 100% 100%;
  background-attachment: scroll;
}

body {
  background: transparent;
  color: var(--text);
  font-family: var(--f-b);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}

/* Subtle film grain for depth (~4% opacity) */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.012;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
}

.app-container {
  position: relative;
  z-index: 1;
}

/* Global AI energy flow — pure decorative overlay; does not affect layout */
.ai-energy-flow {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: visible;
}

.ai-energy-flow__svg {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
}

main#top {
  position: relative;
  z-index: 10;
}

img {
  display: block;
  max-width: 100%;
}

ul {
  list-style: none;
}

a {
  color: inherit;
  text-decoration: none;
}

@media (prefers-reduced-motion: reduce) {

  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }

  html {
    scroll-behavior: auto;
  }
}

/* ============================================================
   PERSISTENT 3D WORLD — fixed behind content
   ============================================================ */
.world {
  position: fixed;
  inset: 0;
  opacity: .78;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  perspective: 1400px;
  transform-style: preserve-3d;
  transition: opacity 0.55s cubic-bezier(.22, 1, .36, 1);
}

.world-bg {
  position: absolute;
  inset: 0;
}

/* Stars */
.world-stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, .5), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(93, 200, 214, .4), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255, 255, 255, .3), transparent),
    radial-gradient(1px 1px at 30% 80%, rgba(93, 200, 214, .3), transparent),
    radial-gradient(2px 2px at 90% 50%, rgba(255, 255, 255, .25), transparent),
    radial-gradient(1px 1px at 10% 60%, rgba(255, 255, 255, .4), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(93, 200, 214, .5), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255, 255, 255, .3), transparent);
  background-size: 800px 800px, 600px 600px, 700px 700px, 500px 500px, 900px 900px, 650px 650px, 750px 750px, 550px 550px;
  background-repeat: repeat;
  opacity: .6;
}

/* Grid floor */
.world-grid {
  position: absolute;
  left: 50%;
  top: 80%;
  width: 220vw;
  height: 140vh;
  transform: translateX(-50%) rotateX(72deg);
  transform-origin: 50% 0%;
  background-image:
    linear-gradient(rgba(135, 151, 196, 0.16) 1px, transparent 1px),
    linear-gradient(90deg, rgba(135, 151, 196, 0.16) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 60% 80% at 50% 0%, #000 0%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 60% 80% at 50% 0%, #000 0%, transparent 80%);
  opacity: .55;
}

/* Glows */
.world-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: .55;
}

.world-glow-a {
  width: 900px;
  height: 900px;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(112, 145, 230, .38), transparent 62%);
}

.world-glow-b {
  width: 700px;
  height: 700px;
  top: 30%;
  right: -200px;
  background: radial-gradient(circle, rgba(173, 187, 212, .22), transparent 62%);
}

.world-glow-c {
  width: 600px;
  height: 600px;
  bottom: -200px;
  left: -150px;
  background: radial-gradient(circle, rgba(61, 82, 160, .45), transparent 62%);
}

/* Dial Group Wrapper to handle off-center translations */
.world-dial-group {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 720px;
  height: 720px;
  transform: translate(calc(-50% + var(--world-x, 0px)), -50%);
  transform-origin: center;
  transition: transform 0.7s cubic-bezier(.22, 1, .36, 1);
}

/* Govern Ring — anchors center, scales/rotates with scroll */
.govern-ring {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 720px;
  height: 720px;
  transform: translate(-50%, -50%) scale(var(--ring-scale, 1)) rotate(var(--ring-rot, 0deg));
  transform-origin: center;
  transition: transform 0.7s cubic-bezier(.22, 1, .36, 1);
  filter: drop-shadow(0 0 40px rgba(112, 145, 230, .14));
}

.govern-ring-svg {
  width: 100%;
  height: 100%;
  animation: ring-spin 90s linear infinite;
}

@keyframes ring-spin {
  to {
    transform: rotate(360deg);
  }
}

.ring-sweep {
  transform-origin: center;
  animation: ring-sweep 6s linear infinite;
}

@keyframes ring-sweep {
  to {
    stroke-dashoffset: -1260;
  }
}

/* Loop nodes around the ring */
.loop-orbit {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 720px;
  height: 720px;
  transform: translate(-50%, -50%) scale(var(--ring-scale, 1));
  transition: transform 0.7s cubic-bezier(.22, 1, .36, 1);
}

.loop-node {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  transform: rotate(var(--angle)) translateY(-330px) rotate(calc(-1 * var(--angle)));
}

.loop-node-dot {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--surf-2);
  border: 1px solid var(--bdr-2);
  transition: all .4s ease;
}

.loop-node.lit .loop-node-dot {
  background: var(--senzai-teal);
  border-color: var(--senzai-teal-bright);
  box-shadow: 0 0 24px var(--senzai-teal-bright), 0 0 48px rgba(93, 200, 214, .5);
  transform: translate(-50%, -50%) scale(1.4);
}

.loop-node-label {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, 22px);
  white-space: nowrap;
  font-family: var(--f-d);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-3);
  transition: color .4s ease;
}

.loop-node.lit .loop-node-label {
  color: var(--senzai-teal-bright);
}

/* World core mark */
.world-core {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 92px;
  height: 92px;
  transform: translate(-50%, -50%) scale(var(--core-scale, 1));
  transition: transform 0.7s cubic-bezier(.22, 1, .36, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 0 24px rgba(71, 177, 191, .4));
}

.world-core img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: .35;
  filter: invert(1) hue-rotate(180deg) brightness(1.1);
  mix-blend-mode: screen;
}
html[data-theme="light"] .world-core img {
  filter: none;
  mix-blend-mode: multiply;
  opacity: .12;
}

/* Depth layers — floating ambient chips */
.depth-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.depth-chip {
  position: absolute;
  font-family: var(--f-d);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-3);
  background: rgba(13, 24, 40, 0.7);
  border: 1px solid var(--bdr);
  padding: 5px 12px;
  border-radius: 100px;
  backdrop-filter: blur(8px);
  white-space: nowrap;
  opacity: .55;
}

.depth-chip.lit {
  color: var(--senzai-teal-bright);
  border-color: var(--bdr-3);
  background: rgba(61, 82, 160, 0.16);
}

.depth-far .depth-chip:nth-child(1) {
  top: 12%;
  left: 6%;
}

.depth-far .depth-chip:nth-child(2) {
  top: 22%;
  right: 8%;
}

.depth-far .depth-chip:nth-child(3) {
  top: 65%;
  left: 4%;
}

.depth-far .depth-chip:nth-child(4) {
  top: 78%;
  right: 10%;
}

.depth-far .depth-chip:nth-child(5) {
  top: 40%;
  left: 8%;
}

.depth-far .depth-chip:nth-child(6) {
  top: 50%;
  right: 6%;
}

.depth-far {
  transform: translateY(calc(var(--scroll-far, 0) * -50px));
}

.depth-mid .depth-chip:nth-child(1) {
  top: 30%;
  right: 14%;
}

.depth-mid .depth-chip:nth-child(2) {
  top: 70%;
  left: 12%;
}

.depth-mid .depth-chip:nth-child(3) {
  top: 18%;
  left: 14%;
}

.depth-mid .depth-chip:nth-child(4) {
  top: 82%;
  right: 16%;
}

.depth-mid {
  transform: translateY(calc(var(--scroll-mid, 0) * -100px));
}

@media (max-width: 900px) {
  .depth-layer {
    display: none;
  }

  .govern-ring,
  .loop-orbit {
    width: 480px;
    height: 480px;
  }

  .loop-node {
    transform: rotate(var(--angle)) translateY(-220px) rotate(calc(-1 * var(--angle)));
  }
}

/* Floating depth-chip drift animations */
@keyframes chip-drift-a {
  0%   { transform: translateY(0px) translateX(0px); opacity: .55; }
  33%  { transform: translateY(-8px) translateX(4px); opacity: .70; }
  66%  { transform: translateY(-4px) translateX(-6px); opacity: .60; }
  100% { transform: translateY(0px) translateX(0px); opacity: .55; }
}
@keyframes chip-drift-b {
  0%   { transform: translateY(0px) translateX(0px); opacity: .45; }
  40%  { transform: translateY(6px) translateX(-5px); opacity: .60; }
  75%  { transform: translateY(-5px) translateX(3px); opacity: .50; }
  100% { transform: translateY(0px) translateX(0px); opacity: .45; }
}
@keyframes chip-drift-c {
  0%   { transform: translateY(0px) translateX(0px); opacity: .38; }
  50%  { transform: translateY(-10px) translateX(6px); opacity: .55; }
  100% { transform: translateY(0px) translateX(0px); opacity: .38; }
}

/* Apply different drift animations per chip */
.depth-far .depth-chip:nth-child(1)  { animation: chip-drift-a 11s ease-in-out infinite; }
.depth-far .depth-chip:nth-child(2)  { animation: chip-drift-b 14s ease-in-out infinite 2s; }
.depth-far .depth-chip:nth-child(3)  { animation: chip-drift-c 9s  ease-in-out infinite 1s; }
.depth-far .depth-chip:nth-child(4)  { animation: chip-drift-a 13s ease-in-out infinite 4s; }
.depth-far .depth-chip:nth-child(5)  { animation: chip-drift-b 10s ease-in-out infinite 3s; }
.depth-far .depth-chip:nth-child(6)  { animation: chip-drift-c 12s ease-in-out infinite 1.5s; }
.depth-mid .depth-chip:nth-child(1)  { animation: chip-drift-b 15s ease-in-out infinite; }
.depth-mid .depth-chip:nth-child(2)  { animation: chip-drift-a 11s ease-in-out infinite 5s; }
.depth-mid .depth-chip:nth-child(3)  { animation: chip-drift-c 13s ease-in-out infinite 2.5s; }
.depth-mid .depth-chip:nth-child(4)  { animation: chip-drift-a 10s ease-in-out infinite 0.8s; }

/* Node pulse ring */
@keyframes node-ping {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: .7; }
  70%  { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
}
.loop-node-ping {
  position: absolute;
  left: 50%; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1px solid var(--senzai-teal-bright);
  opacity: 0;
  pointer-events: none;
}
.loop-node.lit .loop-node-ping {
  animation: node-ping 2.4s ease-out infinite;
}

/* World hidden in light mode */
html[data-theme="light"] .world {
  opacity: .08;
}

/* ============================================================
   NAV
   ============================================================ */
.nav {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  padding: 0 20px;
  height: 56px;
  width: calc(100% - 48px);
  max-width: 1240px;
  background: rgba(10, 14, 26, 0.88);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(255, 255, 255, 0.10);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
}

.nav[data-scrolled='true'] {
  background: rgba(8, 11, 22, 0.96);
  border-color: rgba(255, 255, 255, 0.13);
  box-shadow: 0 6px 32px rgba(0, 0, 0, 0.48);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-mark, .foot-mark {
  width: auto;
  object-fit: contain;
  background: transparent;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
  /* Magic trick for white-background JPEGs in dark mode */
  filter: invert(1) hue-rotate(180deg) brightness(1.1);
  mix-blend-mode: normal;
}

html[data-theme="light"] .nav-mark,
html[data-theme="light"] .foot-mark {
  filter: none;
  mix-blend-mode: multiply;
}

.nav-wordmark {
  font-family: var(--f-d);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--text);
}

.nav-tag {
  font-family: var(--f-d);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--senzai-teal);
  border-left: 1px solid var(--bdr-2);
  padding-left: 12px;
  margin-left: 4px;
}

/* Centered nav links */
.nav-links {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.nav-links a {
  position: relative;
  display: inline-flex;
  align-items: center;
  font-family: var(--f-d);
  font-size: 13.5px;
  font-weight: 450;
  color: rgba(255, 255, 255, 0.72);
  padding: 5px 13px;
  border-radius: 6px;
  transition: color 0.18s ease, background 0.18s ease;
  letter-spacing: 0.01em;
  text-decoration: none;
}

.nav-links a::before,
.nav-links a::after {
  content: '';
  position: absolute;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(to right, #ff0000, #00ffff);
  transform: scaleX(0);
  transition: transform 0.4s ease-out;
  pointer-events: none;
  border-radius: 1px;
}

.nav-links a::after {
  bottom: 3px;
  transform-origin: right;
}

.nav-links a::before {
  top: 3px;
  transform-origin: left;
}

.nav-links a:hover,
.nav-links a:focus-visible {
  color: #7ecde9;
  background: rgba(255, 255, 255, 0.06);
}

.nav-links a:hover::after,
.nav-links a:hover::before,
.nav-links a:focus-visible::after,
.nav-links a:focus-visible::before {
  transform: scaleX(1);
}

@media (prefers-reduced-motion: reduce) {

  .nav-links a::before,
  .nav-links a::after {
    transition-duration: 0.01ms;
  }
}

/* Right-side actions group */
.nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* Ghost / outline button */
.nav-cta-ghost {
  display: inline-flex;
  align-items: center;
  padding: 7px 18px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  background: transparent;
  color: rgba(255, 255, 255, 0.88) !important;
  font-family: var(--f-d);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
  white-space: nowrap;
}

.nav-cta-ghost:hover {
  border-color: rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.06);
  color: #fff !important;
}

/* Solid CTA button */
.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 18px;
  border-radius: 8px;
  background: #fff;
  color: #0a0e1a !important;
  font-family: var(--f-d);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  border: 1px solid rgba(255, 255, 255, 0.9);
  transition:
    transform 0.22s cubic-bezier(0.22, 1, 0.36, 1),
    background 0.2s ease,
    box-shadow 0.22s ease;
  white-space: nowrap;
}

.nav-cta:hover {
  transform: translateY(-1px);
  background: #eef0ff;
  box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
}

@media (max-width: 900px) {
  .nav {
    grid-template-columns: 1fr auto;
    justify-content: space-between;
    width: calc(100% - 24px);
    padding: 0 14px;
  }

  .nav-tag {
    display: none;
  }

  .nav-links {
    display: none;
  }

  .nav-cta-ghost {
    display: none;
  }
}

/* ============================================================
   STAGES — sections sit above the world
   ============================================================ */
.stage {
  position: relative;
  z-index: 2;
  isolation: isolate;
}

@keyframes loop-divider-glow {

  0%,
  100% {
    opacity: 0.45;
    filter: drop-shadow(0 0 6px rgba(96, 165, 250, 0.35));
  }

  50% {
    opacity: 1;
    filter: drop-shadow(0 0 14px rgba(96, 165, 250, 0.65));
  }
}

@keyframes loop-dot-pulse {

  0%,

/* Parallax decorative layer (hero only) */
.hero-parallax-bg {
  position: absolute;
  left: 50%;
  top: 28%;
  width: 140%;
  max-width: 1200px;
  height: 480px;
  transform: translateX(-50%);
  z-index: 0;
  pointer-events: none;
}

.hero-parallax-blob {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  filter: blur(72px);
  opacity: 0.45;
}

.hero-parallax-blob--a {
  background: radial-gradient(circle at 35% 40%, rgba(112, 145, 230, 0.32) 0%, transparent 62%);
}

.hero-parallax-blob--b {
  background: radial-gradient(circle at 70% 55%, rgba(173, 187, 212, 0.22) 0%, transparent 58%);
}

.hero-title-aurora {
  position: absolute;
  left: 50%;
  top: 38%;
  width: min(94%, 800px);
  height: clamp(100px, 20vw, 200px);
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, rgba(112, 145, 230, 0.18) 0%, rgba(61, 82, 160, 0.12) 42%, transparent 72%);
  filter: blur(36px);
  animation: heroGlowPulse 7s ease-in-out infinite alternate;
}

@keyframes heroGlowPulse {
  0% {
    opacity: 0.5;
    transform: translate(-50%, -50%) scale(0.97);
  }

  100% {
    opacity: 0.82;
    transform: translate(-50%, -50%) scale(1.04);
  }

  /* hover handled by .btn-primary:hover */

/* ============================================================
   HERO PIPELINE ARC
   ============================================================ */
.hero-pipeline {
  width: 100%;
  background: transparent;
  position: relative;
  margin-top: -clamp(8px, 2vh, 28px);
}

/* Background layer sits behind the canvas animation — z-index: -1 keeps
   the glowing lines fully intact. Color matches global --bg-0 (#0a0e1a). */
.hero-pipeline::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-color: var(--bg-0);
}

.pipeline-wrap {
  position: relative;
  width: 100%;
}

.pipeline-canvas {
  width: 100%;
  height: auto;
  display: block;
}

.pipeline-labels {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  pointer-events: none;
}

.pipeline-label {
  position: absolute;
  top: 0;
  transform: translate(-50%, -50%);
  background: rgba(10, 20, 40, 0.7);
  border: 1px solid rgba(70, 130, 180, 0.4);
  border-radius: 100px;
  padding: 6px 16px;
  font-family: var(--f-d);
  font-size: 12px;
  font-weight: 600;
  color: #7ec8e3;
  box-shadow: 0 0 12px rgba(70, 130, 180, 0.2);
  text-shadow: 0 0 8px rgba(126, 200, 227, 0.3);
  white-space: nowrap;
  letter-spacing: 0.02em;
  backdrop-filter: blur(8px);
}

/* ============================================================
   PROBLEM
   ============================================================ */
.problem-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid var(--bdr);
  background: var(--glass-strong);
  backdrop-filter: blur(16px) saturate(1.12);
  border-radius: 16px;
  overflow: hidden;
  box-shadow:
    0 28px 72px rgba(8, 12, 28, 0.45),
    0 0 0 1px rgba(255, 255, 255, 0.04) inset;
}

.problem-card {
  border-right: 1px solid var(--bdr);
  position: relative;
  perspective: 1200px;
  transform-style: preserve-3d;
  min-height: 360px;
  outline: none;
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease;
}

.problem-card:last-child {
  border-right: none;
}

.problem-card:hover {
  z-index: 2;
  transform: translateY(-8px) perspective(1200px) rotateX(1.5deg);
  box-shadow:
    0 36px 80px rgba(8, 12, 28, 0.5),
    0 0 0 1px rgba(112, 145, 230, 0.25),
    0 0 52px rgba(61, 82, 160, 0.15);
}

.problem-card:focus-visible {
  box-shadow:
    0 0 0 2px rgba(112, 145, 230, 0.35),
    0 0 0 1px rgba(173, 187, 212, 0.2) inset;
}

.problem-num {
  font-family: var(--f-d);
  font-size: 72px;
  font-weight: 700;
  line-height: .9;
  letter-spacing: -.05em;
  color: rgba(112, 145, 230, 0.16);
  margin: 0;
  position: absolute;
  top: 26px;
  left: 26px;
  pointer-events: none;
}

.problem-card h3 {
  color: var(--text);
}

.problem-card p {
  color: var(--text-2);
  font-size: 14px;
  line-height: 1.7;
}

/* Flip card */
.flip-card-inner {
  position: relative;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform .75s cubic-bezier(.22, 1, .36, 1);
}

.problem-card:hover .flip-card-inner,
.problem-card:focus-visible .flip-card-inner,
.problem-card:focus-within .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 0;
  padding: 46px 36px 40px;
  background: rgba(24, 32, 62, 0.42);
  transition: background .35s ease, border-color .35s ease;
}

.problem-card:hover .flip-card-face {
  background: rgba(30, 40, 78, 0.55);
}

.flip-card-front {
  transform: rotateY(0deg);
}

.flip-card-back {
  transform: rotateY(180deg);
}

.problem-media {
  margin-top: 56px;
  margin-bottom: 18px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(173, 187, 212, 0.18);
  box-shadow:
    0 22px 60px rgba(8, 12, 28, 0.45),
    0 0 0 1px rgba(112, 145, 230, 0.08);
}

.problem-media img {
  display: block;
  width: 100%;
  height: 160px;
  object-fit: cover;
  transform: translateZ(0);
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.problem-card:hover .problem-media img,
.problem-card:focus-visible .problem-media img {
  transform: translateZ(0) scale(1.05);
}

.flip-card-front h3 {
  margin-top: 6px;
}

.flip-card-back h3 {
  margin-top: 56px;
  margin-bottom: 12px;
}

.flip-card-back p {
  max-width: 54ch;
}

@media (prefers-reduced-motion: reduce) {
  .flip-card-inner {
    transition: none;
  }

  .problem-card:hover .flip-card-inner,
  .problem-card:focus-visible .flip-card-inner,
  .problem-card:focus-within .flip-card-inner {
    transform: none;
  }

  .problem-card:hover,
  .problem-card:focus-visible {
    transform: none;
    box-shadow: none;
  }

  .problem-card:hover .problem-media img,
  .problem-card:focus-visible .problem-media img {
    transform: translateZ(0);
  }
}

@media (max-width: 900px) {
  .problem-grid {
    grid-template-columns: 1fr;
  }

  .problem-card {
    border-right: none;
    border-bottom: 1px solid var(--bdr);
  }
}

/* ============================================================
   SPLIT LAYOUT (decide / design / govern / reuse / accelerate)
   ============================================================ */
.split {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: clamp(24px, 4vw, 48px);
  align-items: flex-start;
}

.split-flip {
  direction: rtl;
}

.split-flip>* {
  direction: ltr;
}

.split-copy h2 {
  margin-bottom: 12px;
  font-size: clamp(28px, 3.5vw, 44px);
}

.split-copy .lede {
  margin-bottom: 20px;
  font-size: clamp(14px, 1.2vw, 16px);
}

.bullets {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.bullets li {
  display: grid;
  grid-template-columns: 14px minmax(0, 220px) minmax(0, 1fr);
  align-items: start;
  column-gap: 18px;
  row-gap: 4px;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.65;
  position: relative;
  padding-left: 0;

  perspective: 1200px;
  position: relative;
  width: 100%;

.radar-flip-inner {
  position: relative;
  width: 100%;
  height: 100%;

.radar-flip-front,

  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;

  border-radius: 6px;
  background: #F8FAFC;

/* Blueprint */
.bp-steps {
  display: flex;
  gap: 0;
  margin-bottom: 10px;
}

.bp-sim {
  position: relative;
  overflow: hidden;
}

.bp-processing-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, rgba(59, 130, 246, 0) 20%, rgba(59, 130, 246, 0.12) 45%, rgba(59, 130, 246, 0) 70%);
  opacity: 0;
  transform: translateX(-120%);
  pointer-events: none;
}

.bp-sim.is-processing .bp-processing-overlay {
  opacity: 1;
  animation: bpProcessingSweep 1.5s ease-out infinite;
}

.bp-sim.is-complete .bp-processing-overlay {
  animation: none;
  opacity: 0;
}

.bp-step {
  flex: 1;
  text-align: center;
  position: relative;
}

.bp-step::after {
  content: '';
  position: absolute;
  top: 11px;
  right: 0;
  width: 50%;
  height: 1px;
  background: #CBD5E1;
}

.bp-step:last-child::after {
  display: none;
}

.bp-step-n {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  margin: 0 auto 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-d);
  font-size: 10px;
  font-weight: 700;
  position: relative;
  z-index: 1;
}

.bp-step-n.done {
  background: var(--mc-primary);
  color: #fff;
}

.bp-step-n.act {
  background: var(--mc-primary);
  color: #fff;
  box-shadow: 0 0 0 4px rgba(61, 82, 160, .28);
}

.bp-step-n.wait {
  background: #E2E8F0;
  color: #94A3B8;
}

.bp-step-n.done {
  animation: bpCheckPop .36s cubic-bezier(.22, 1, .36, 1);
}

.bp-step-n.act::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(112, 145, 230, 0.4);
  animation: bpPulseRing 1.1s ease-out infinite;
}

.bp-step-l {
  font-family: var(--f-d);
  font-size: 9px;
  font-weight: 600;
  color: #64748B;
}

.bp-row {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 6px;
  padding: 6px 10px;
  margin-bottom: 4px;
  position: relative;
  opacity: 0;
  transform: translateY(10px);
  overflow: hidden;
  transition: border-color .2s ease;
}

.bp-row.done {
  border-left: 3px solid var(--mc-primary);
}

.bp-row.is-loading {
  opacity: 1;
  transform: translateY(0);
}

.bp-row.is-loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, rgba(255, 255, 255, 0) 20%, rgba(191, 219, 254, 0.65) 50%, rgba(255, 255, 255, 0) 80%);
  transform: translateX(-120%);
  animation: bpRowShimmer .45s ease-out;
}

.bp-row.is-done {
  opacity: 1;
  transform: translateY(0);
  animation: bpRowDrop .5s cubic-bezier(.22, 1, .36, 1);
}

.bp-row-ping {
  position: absolute;
  right: 8px;
  top: 8px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(61, 82, 160, 0.85);
  opacity: 0;
}

.bp-row.is-done .bp-row-ping {
  animation: bpNotifyDrop .42s ease-out;
}

.bp-row-num {
  font-family: var(--f-d);
  font-size: 9px;
  font-weight: 700;
  color: #94A3B8;
  letter-spacing: .07em;
  margin-bottom: 2px;
}

.bp-row-title {
  font-family: var(--f-d);
  font-size: 12px;
  font-weight: 600;
  color: #1E293B;
}

.bp-row-val {
  font-size: 10px;
  color: #64748B;
  margin-top: 1px;
}

.bp-score {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding: 8px 12px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #E2E8F0;
  opacity: .75;
  transition: opacity .3s ease;
}

.bp-score.is-live {
  opacity: 1;
}

.bps-l {
  font-family: var(--f-d);
  font-size: 10px;
  font-weight: 700;
  color: #64748B;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.bps-d {
  font-size: 10px;
  color: #94A3B8;
  margin-top: 2px;
  opacity: .85;
  transition: opacity .25s ease, color .25s ease;
}

.bp-score.is-approved .bps-d {
  opacity: 1;
  color: #64748B;
}

.bps-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bps-bars {
  display: flex;
  gap: 3px;
  align-items: flex-end;
}

.bps-bars span {
  width: 6px;
  border-radius: 2px;
  background: #C7D2FE;
  display: block;
  transform-origin: bottom;
  transform: scaleY(.15);
  transition: transform .42s cubic-bezier(.22, 1, .36, 1);
}

.bp-score.is-live .bps-bars span {
  transform: scaleY(1);
}

.bps-bars span.hi {
  background: var(--mc-primary);
}

.bps-v {
  font-family: var(--f-d);
  font-size: 24px;
  font-weight: 700;
  color: var(--mc-primary);
  min-width: 2.2ch;
  text-align: right;
  transition: transform .22s ease;
}

.bp-score.is-live .bps-v {
  transform: translateY(-1px);
}

@keyframes bpProcessingSweep {
  0% {
    transform: translateX(-120%);
  }

  100% {
    transform: translateX(120%);
  }
}

@keyframes bpCheckPop {
  0% {
    transform: scale(.78);
  }

  70% {
    transform: scale(1.09);
  }

  100% {
    transform: scale(1);
  }
}

@keyframes bpPulseRing {
  0% {
    transform: scale(.86);
    opacity: .95;
  }

  100% {
    transform: scale(1.22);
    opacity: 0;
  }
}

@keyframes bpRowShimmer {
  0% {
    transform: translateX(-120%);
    opacity: .2;
  }

  100% {
    transform: translateX(120%);
    opacity: .55;
  }
}

@keyframes bpRowDrop {
  0% {
    opacity: 0;
    transform: translateY(11px) scale(.995);
  }

  70% {
    opacity: 1;
    transform: translateY(-1px) scale(1.002);
  }

  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes bpNotifyDrop {
  0% {
    opacity: 0;
    transform: translateY(-4px) scale(.6);
  }

  60% {
    opacity: .9;
    transform: translateY(0) scale(1);
  }

  100% {
    opacity: 0;
    transform: translateY(2px) scale(1.05);
  }
}

/* ============================================================
   TESTIMONIALS
   ============================================================ */
.testi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.testi {
  background: var(--glass-strong);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  padding: 32px 28px;
  position: relative;
  backdrop-filter: blur(16px) saturate(1.1);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
  transform-style: preserve-3d;
  isolation: isolate;
  transition:
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.45s ease,
    border-color 0.35s ease;
}

.testi:hover {
  transform: translateY(-8px) perspective(1400px) rotateY(2.5deg);
  border-color: rgba(127, 249, 255, 0.4);
  box-shadow:
    0 32px 64px rgba(8, 12, 28, 0.42),
    0 0 0 1px rgba(0, 255, 255, 0.18),
    0 0 12px rgba(255, 255, 255, 0.05),
    0 0 28px rgba(0, 255, 255, 0.24),
    0 0 44px rgba(127, 249, 255, 0.14);
}

.testi::before {
  content: '"';
  font-family: var(--f-d);
  font-size: 80px;
  font-weight: 700;
  color: rgba(112, 145, 230, 0.12);
  position: absolute;
  top: 4px;
  left: 18px;
  line-height: 1;
  z-index: 1;
}

.testi::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 0.45s ease;
  background:
    radial-gradient(ellipse 70% 56% at 50% 42%,
      rgba(255, 255, 255, 0.1) 0%,
      rgba(127, 249, 255, 0.16) 22%,
      rgba(0, 255, 255, 0.08) 45%,
      transparent 70%),
    linear-gradient(90deg,
      transparent 0%,
      transparent calc(50% - 1px),
      rgba(0, 255, 255, 0.07) 50%,
      transparent calc(50% + 1px),
      transparent 100%);
}

.testi:hover::after {
  opacity: 0.78;
}

.testi p {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 24px;
  position: relative;
  z-index: 2;
}

.testi-who {
  font-family: var(--f-d);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  position: relative;
  z-index: 2;
}

.testi-role {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
  position: relative;
  z-index: 2;
}

.placeholder-note {
  text-align: center;
  margin-top: 32px;
  font-family: var(--f-m);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: .04em;
}

.placeholder-note:empty {
  display: none;
  margin-top: 0;
}

[data-placeholder] {
  position: relative;
}

@media (max-width: 900px) {
  .testi-grid {
    grid-template-columns: 1fr;
  }
}

   FOOTER
   ============================================================ */
.site-foot {
  position: relative;

}

.foot-inner {
  max-width: var(--container);
  margin: 0 auto;
  display: flex;
  align-items: center;

/* Scroll reveal handled by Framer Motion */
@media (prefers-reduced-motion: reduce) {
  body::after {
    opacity: 0.025;
  }

  .hero-title-aurora {
    animation: none;
    opacity: 0.55;
  }

  .loop-hero-divider-line,
  .loop-hero-divider-dot {
    animation: none !important;
  }

  .loop-hero-divider-dot {
    transform: translate(-50%, -50%) scale(1);
    box-shadow:
      0 0 0 1px rgba(147, 197, 253, 0.45),
      0 0 14px rgba(59, 130, 246, 0.45);
  }

  .loop-step:hover,
  .testi:hover,
  .mk-card:hover,
  .pf-card:hover {
    transform: none;
  }

  .tilt:hover,
  .tilt-flip:hover {
    transform: perspective(1600px) rotateY(-6deg) rotateX(3deg);
  }

  .tilt-flip:hover {
    transform: perspective(1600px) rotateY(6deg) rotateX(3deg);
  }

  .fr-file-live {
    animation: none;
  }
}

/* ============================================================
   Reference-style section skin (data/content unchanged)
   ============================================================ */
.stage {
  position: relative;
  padding-top: clamp(52px, 6vh, 78px);
  padding-bottom: clamp(52px, 6vh, 78px);
  min-height: calc(100vh - var(--nav-scroll-offset, 72px));
  display: grid;
  align-items: center;
}

/* First fold: clear fixed nav + gap; no forced inner min-height (avoids dead space above pipeline) */
.stage.stage-hero {
  align-items: center;
  min-height: 100vh;
  padding-top: calc(var(--nav-scroll-offset, 80px) + 20px);
  padding-bottom: clamp(40px, 6vh, 80px);
}

.stage.stage-hero>.stage-inner.hero-inner {
  min-height: 0;
}

.stage.stage-hero .btn {
  padding: 13px 26px;
  font-size: 15px;
  border-radius: 10px;
}

.stage-inner {
  position: relative;
  max-width: min(1120px, calc(100vw - 72px));
  margin: 0 auto;
  min-height: clamp(520px, 78vh, 760px);
  background: transparent;
  border: none;
  border-radius: 0;
  backdrop-filter: none;
  box-shadow: none;
  overflow: visible;
}

.split {
  grid-template-columns: minmax(420px, 1.08fr) minmax(300px, 0.92fr);
  gap: clamp(20px, 2.4vw, 36px);
  align-items: flex-start;
}

.split-copy {
  max-width: 560px;
  padding-left: clamp(20px, 3vw, 40px);
  padding-top: clamp(22px, 2.3vw, 34px);
  padding-bottom: clamp(22px, 2.3vw, 34px);
}

.split-art {
  min-width: 0;
  max-width: 100%;
  padding: clamp(14px, 1.8vw, 24px);
}

.section-head,
.loop-hero-inner,
.cta-inner {
  padding-left: clamp(20px, 3vw, 40px);
  padding-right: clamp(20px, 2.2vw, 30px);
}

.eyebrow {
  color: rgba(150, 212, 245, 0.9);
  letter-spacing: 0.11em;
}

.lede,
.split-copy p,
.split-copy li,
.loop-hero-mono {
  color: rgba(216, 232, 246, 0.82);
}

.screen,
.problem-grid,
.loop-step,
.testi {
  border: 1px solid rgba(137, 195, 226, 0.16);
  background: linear-gradient(160deg, rgba(10, 17, 36, 0.84) 0%, rgba(11, 20, 42, 0.68) 100%);
  box-shadow:
    inset 0 0 0 1px rgba(225, 245, 255, 0.02),
    0 14px 42px rgba(1, 6, 18, 0.48);
}

.screen-title,
.ls-t,
.pf-title {
  color: rgba(224, 242, 255, 0.92);
}

.site-foot {
  border-top-color: rgba(137, 195, 226, 0.18);
}

@media (max-width: 1024px) {
  .stage-inner {
    max-width: min(1080px, calc(100vw - 30px));
    min-height: clamp(500px, 74vh, 700px);
  }

  .split {
    grid-template-columns: minmax(360px, 1fr) minmax(280px, 0.95fr);
    gap: 22px;
  }

  .split-copy,
  .section-head,
  .loop-hero-inner,
  .cta-inner {
    padding-left: clamp(32px, 4vw, 56px);
  }
}

@media (max-width: 900px) {
  .stage {
    min-height: auto;
    display: block;
    padding-top: 32px;
    padding-bottom: 36px;
  }

  .stage-inner {
    border-radius: 0;
    max-width: calc(100vw - 18px);
    min-height: auto;
  }

  .split,
  .split.split-flip {
    grid-template-columns: 1fr;
  }

  .split-copy,
  .section-head,
  .loop-hero-inner,
  .cta-inner {
    max-width: none;
    padding-left: 20px;
    padding-right: 16px;
    padding-top: 22px;
    padding-bottom: 22px;
  }

  .split-art {
    min-width: 0;
    max-width: 100%;
    padding: 10px 12px 16px;
  }
}

/* SenzaiLoopTransition Styles */
.loop-transition-outer {
  width: 100%;
  margin-top: 48px;
}

.loop-transition-sticky {
  position: sticky;
  top: 80px;
  /* exactly fits: card row (72px) + breathing room + nav end state */
  height: 260px;
  overflow: visible;
}

.loop-transition-stage {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

/* Card starts: horizontal, tight, top-left */
.loop-transition-card {
  position: absolute;
  background: #ffffff;
  border: 1px solid rgba(15, 34, 54, 0.08);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  z-index: 10;
}

.loop-transition-card .card-num {
  font-family: var(--f-m);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: #64748B;
  display: block;
}

.loop-transition-card .card-label {
  font-family: var(--f-d);
  font-size: 15px;
  font-weight: 700;
  color: #0F172A;
}

/* ─── Sidebar nav items (end state of transition) ─────────────────────────── */
.lt-nav-item {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}

.lt-nav-dot-wrap {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.lt-nav-dot {
  display: block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4db8ff;
  box-shadow: 0 0 8px rgba(77, 184, 255, 0.7), 0 0 18px rgba(77, 184, 255, 0.3);
}

.lt-nav-label {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: rgba(255, 255, 255, 0.35);
  transition: color 0.2s ease;
  white-space: nowrap;
}

.lt-nav-item--active .lt-nav-label {
  color: rgba(255, 255, 255, 0.92);
  font-weight: 600;
}

/* ═══════════════════════════════════════════════
   PLATFORM SHELL — Vertical Nav + Sections
   ═══════════════════════════════════════════════ */
.platform-stages-shell {
  display: flex;
  align-items: flex-start;
  position: relative;
  background: transparent;
}

.platform-stages-shell::before {
  content: '';
  position: absolute;
  left: calc(32px + 7px);
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(77, 184, 255, 0.28);
  pointer-events: none;
  z-index: 1;
}

.platform-stages-shell::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 1px;
  background: rgba(77, 184, 255, 0.28);
  pointer-events: none;
  z-index: 1;
}

.platform-stages-main {
  flex: 1 1 0%;
  min-width: 0;
}

/* ═══════════════════════════════════════════════
   PNAV — LangChain-style Vertical Sticky Nav
   ═══════════════════════════════════════════════ */

/* Desktop sticky sidebar */
.pnav--vert {
  width: 180px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  padding-left: 32px;
  z-index: 40;
}

.pnav__list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.pnav__link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  padding: 5px 0;
  cursor: pointer;
  user-select: none;
}

/* Dot column — fixed 14px wide so labels stay aligned */
.pnav__dot-wrap {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.pnav__dot {
  display: block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4db8ff;
  box-shadow: 0 0 8px rgba(77, 184, 255, 0.7), 0 0 18px rgba(77, 184, 255, 0.3);
}

.pnav__label {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: rgba(180, 210, 240, 0.45);
  transition: color 0.22s ease;
  white-space: nowrap;
}

.pnav__link.is-active .pnav__label {
  color: rgba(220, 240, 255, 0.96);
  font-weight: 500;
}

.pnav__link:not(.is-active):hover .pnav__label {
  color: rgba(180, 210, 240, 0.72);
}

/* Mobile: horizontal pill bar */
.pnav--horiz {
  display: flex;
  gap: 4px;
  padding: 10px 16px;
  position: sticky;
  top: 0;
  z-index: 40;
  width: 100%;
  background: rgba(8, 12, 20, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  overflow-x: auto;
  scrollbar-width: none;
}

.pnav--horiz::-webkit-scrollbar {
  display: none;
}

.pnav--horiz .pnav__link {

/* ================================================================
   TestimonialsSlider.css
   Click-to-advance, no blur, side card text visible at low opacity.
   ================================================================ */

.ts-slider {
  --ts-card-width: min(20vw, 260px);
  --ts-card-aspect: 3 / 4;
  --ts-transition-dur: 800ms;
  --ts-transition-ease: cubic-bezier(0.22, 1, 0.36, 1);

  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 36px 0 28px;
  position: relative;
}

.ts-slides__wrapper {
  flex: 1;
  min-width: 0;
  display: grid;
  place-items: center;
}

.ts-slides {
  width: 100%;
  display: grid;
  place-items: center;
}

.ts-slides > * {
  grid-area: 1 / -1;
}

.ts-slide {
  --ts-tx: 0px;
  --ts-tz: 0px;
  --ts-rotY: 0deg;
  --ts-scale: 1;

  container-type: inline-size;
  width: var(--ts-card-width);
  aspect-ratio: var(--ts-card-aspect);
  perspective: 800px;
  user-select: none;
  position: relative;
  isolation: isolate;

  transform:
    perspective(1000px)
    translate3d(var(--ts-tx), 0, var(--ts-tz))
    rotateY(var(--ts-rotY))
    scale(var(--ts-scale));

  transition:
    transform var(--ts-transition-dur) var(--ts-transition-ease),
    opacity var(--ts-transition-dur) var(--ts-transition-ease),
    filter var(--ts-transition-dur) var(--ts-transition-ease),
    box-shadow 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  border-radius: 22px;
}

.ts-slide[data-state='current'] {
  --ts-scale: 1.06;
  --ts-tx: 0px;
  --ts-tz: 0px;
  --ts-rotY: 0deg;

  opacity: 1;
  filter: brightness(1);
  z-index: 20;
  pointer-events: auto;
}

.ts-slide[data-state='next'] {
  --ts-tx: calc(var(--ts-card-width) * 1.07);
  --ts-rotY: -45deg;
  --ts-scale: 1;

  opacity: 0.65;
  filter: brightness(0.7);
  z-index: 10;
  pointer-events: auto;
  cursor: pointer;
}

.ts-slide[data-state='previous'] {
  --ts-tx: calc(-1 * var(--ts-card-width) * 1.07);
  --ts-rotY: 45deg;
  --ts-scale: 1;

  opacity: 0.65;
  filter: brightness(0.7);
  z-index: 10;
  pointer-events: auto;
  cursor: pointer;
}

.ts-slide[data-state='next']:hover,
.ts-slide[data-state='previous']:hover {
  opacity: 0.88;
  filter: brightness(0.9);
  --ts-scale: 1.05;
}

/* Tight white→cyan bloom on the card only (no wide spill onto neighbors) */
.ts-slide:hover {
  box-shadow:
    0 0 0 1px rgba(0, 255, 255, 0.16),
    0 0 10px rgba(255, 255, 255, 0.06),
    0 0 22px rgba(0, 255, 255, 0.22),
    0 0 36px rgba(127, 249, 255, 0.14);
}

.ts-slide[data-state='current']:hover {
  box-shadow:
    0 0 0 1px rgba(0, 255, 255, 0.2),
    0 0 12px rgba(255, 255, 255, 0.07),
    0 0 26px rgba(0, 255, 255, 0.28),
    0 0 42px rgba(127, 249, 255, 0.18);
}

.ts-slide:hover .ts-slide__inner {
  border-color: rgba(127, 249, 255, 0.42);
  box-shadow:
    0 4px 32px rgba(0, 0, 0, 0.45),
    0 1px 0 rgba(255, 255, 255, 0.09) inset;
}

.ts-slide__inner {
  --rotX: 0deg;
  --rotY: 0deg;

  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transform: rotateX(var(--rotX)) rotateY(var(--rotY));

  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  box-shadow:
    0 4px 32px rgba(0, 0, 0, 0.4),
    0 1px 0 rgba(255, 255, 255, 0.06) inset;
  transition:
    transform 0.1s linear,
    border-color 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.ts-slide__inner::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  z-index: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.07) 0%, transparent 60%);
  pointer-events: none;
}

/* Soft lens glow — clipped to card; fades in on hover */
.ts-slide__inner::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  background:
    radial-gradient(
      ellipse 68% 54% at 50% 46%,
      rgba(255, 255, 255, 0.12) 0%,
      rgba(127, 249, 255, 0.18) 20%,
      rgba(0, 255, 255, 0.1) 44%,
      transparent 70%
    ),
    linear-gradient(
      90deg,
      transparent 0%,
      transparent calc(50% - 1px),
      rgba(0, 255, 255, 0.09) 50%,
      transparent calc(50% + 1px),
      transparent 100%
    );
}

.ts-slide:hover .ts-slide__inner::after {
  opacity: 0.78;
}

.ts-slide__qq {
  position: absolute;
  top: 14px;
  left: 20px;
  z-index: 2;
  font-size: clamp(2.5rem, 10cqw, 3.75rem);
  line-height: 1;
  font-family: var(--f-d, 'Space Grotesk', 'Inter', sans-serif);
  font-weight: 700;
  color: rgba(255, 255, 255, 0.09);
  pointer-events: none;
  user-select: none;
}

.ts-slide__text-wrapper {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.ts-slide--text {
  overflow: visible;
}

.ts-slide--text span {
  display: block;
  transition:
    opacity var(--ts-transition-dur) var(--ts-transition-ease),
    transform var(--ts-transition-dur) var(--ts-transition-ease);
}

.ts-slide[data-state='current'] .ts-slide--text span {
  opacity: 1;
  transform: translate3d(0, 0, 0);
  transition-delay: 250ms;
}

.ts-slide:not([data-state='current']) .ts-slide--text span {
  opacity: 0.45;
  transform: translate3d(0, 0, 0);
  transition-delay: 0ms;
}

.ts-slide--quote span {
  font-family: var(--f-d, 'Inter', sans-serif);
  font-size: clamp(0.8rem, 1.5cqw, 0.92rem);
  font-weight: 400;
  line-height: 1.65;
  color: rgba(255, 255, 255, 0.82);
  white-space: normal;
}

.ts-slide--name span {
  font-family: var(--f-d, 'Space Grotesk', 'Inter', sans-serif);
  font-size: clamp(0.88rem, 1.8cqw, 1rem);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.01em;
  margin-top: 4px;
}

.ts-slide--role span {
  font-family: var(--f-d, 'Inter', sans-serif);
  font-size: clamp(0.7rem, 1.2cqw, 0.78rem);
  font-weight: 400;
  color: rgba(255, 255, 255, 0.45);
  letter-spacing: 0.02em;
}

.ts-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 32px;
}

.ts-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  border: none;
  padding: 0;
  cursor: pointer;
  transition:
    background 300ms ease,
    width 300ms ease;
}

.ts-dot--active {
  background: rgba(255, 255, 255, 0.85);
  width: 22px;
  border-radius: 4px;
}

.ts-dot:hover:not(.ts-dot--active) {
  background: rgba(255, 255, 255, 0.45);
}

.ts-dot:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.5);
  outline-offset: 3px;
}

@media (max-width: 768px) {
  .ts-slider {
    --ts-card-width: min(58vw, 260px);
  }

  .ts-slide[data-state='next'],
  .ts-slide[data-state='previous'] {
    opacity: 0;
    pointer-events: none;
  }
}

@media (prefers-reduced-motion: reduce) {
  .ts-slide {
    transition-duration: 0.01ms;
  }

  .ts-slide--text span {
    transition-duration: 0.01ms;
    transition-delay: 0ms !important;
  }

  .ts-slide[data-state='next']:hover,
  .ts-slide[data-state='previous']:hover {
    --ts-scale: 1;
  }
}


/* ============================================================
   LIGHT THEME — overrides applied via html[data-theme="light"]
   Warm-white + soft blue professional palette (Linear/Notion/Vercel energy)
   ============================================================ */

/* ── Core design tokens ── */
html[data-theme="light"] {
  /* Backgrounds */
  --bg-0: #FFFFFF;
  --bg-1: #F7F9FC;
  --bg-2: #FFFFFF;
  --page-bg-base: #FFFFFF;
  --page-bg-road: linear-gradient(160deg, #F0F7FF 0%, #FFFFFF 60%);

  /* Surfaces */
  --surf: rgba(255, 255, 255, 0.95);
  --surf-2: rgba(247, 249, 252, 0.98);
  --surf-3: rgba(240, 246, 255, 1);
  --glass: rgba(255, 255, 255, 0.80);
  --glass-strong: rgba(255, 255, 255, 0.95);

  /* Borders */
  --bdr: #E2E8F0;
  --bdr-2: #CBD5E1;
  --bdr-3: #94A3B8;

  /* Text */
  --text: #0A1628;
  --text-2: #334155;
  --text-3: #64748B;

  /* Accent */
  --cta: #2563EB;
  --cta-h: #1D4ED8;
  --cta-glow: rgba(37, 99, 235, 0.25);
  --senzai-teal: #0891B2;
  --senzai-teal-bright: #0EA5E9;
  --mc-lavender: #0891B2;
  --mc-primary: #2563EB;
  --mc-accent: #2563EB;

  /* Shadows */
  --shadow-card: 0 2px 16px rgba(10, 22, 40, 0.07);
  --shadow-nav: 0 1px 8px rgba(10, 22, 40, 0.06);
  --shadow-strong: 0 8px 32px rgba(10, 22, 40, 0.10);
}

/* ── Page background ── */
html[data-theme="light"] {
  background-color: #FFFFFF;
  background-image: linear-gradient(160deg, #F0F7FF 0%, #FFFFFF 60%);
  background-attachment: fixed;
}

/* ── Hide heavy 3-D world layer entirely ── */
html[data-theme="light"] .world {
  opacity: 0;
  pointer-events: none;
}

html[data-theme="light"] body::after {
  opacity: 0;
}

/* ── Body text ── */
html[data-theme="light"] body {
  color: #334155;
  background: transparent;
}

/* ── Typography scale ── */

// ── Theme Toggle ──
(function() {
  const html = document.documentElement;
  const STORAGE_KEY = 'senzai-theme';

  // Restore saved preference
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === 'light') html.setAttribute('data-theme', 'light');

  function buildToggle() {
    const btn = document.createElement('button');
    btn.id = 'theme-toggle-btn';
    btn.className = 'theme-toggle';
    btn.setAttribute('aria-label', 'Toggle colour theme');
    btn.setAttribute('title', 'Toggle dark / light theme');
    
    // Make it look like a clean, floating action button
    btn.style.position = 'fixed';
    btn.style.top = '24px';
    btn.style.right = '24px';
    btn.style.zIndex = '9999';
    btn.style.width = '44px';
    btn.style.height = '44px';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.justifyContent = 'center';
    btn.style.backgroundColor = '#FFFFFF';
    btn.style.border = '1px solid #E2E8F0';
    btn.style.boxShadow = '0 4px 12px rgba(10, 22, 40, 0.08)';
    btn.style.borderRadius = '50%';
    btn.style.cursor = 'pointer';
    btn.style.color = '#475569';
    btn.style.transition = 'all 0.2s ease';

    // Add a simple hover effect
    btn.onmouseover = () => {
      btn.style.transform = 'translateY(-2px)';
      btn.style.boxShadow = '0 6px 16px rgba(10, 22, 40, 0.12)';
      btn.style.color = '#2563EB';
    };
    btn.onmouseout = () => {
      btn.style.transform = 'translateY(0)';
      btn.style.boxShadow = '0 4px 12px rgba(10, 22, 40, 0.08)';
      btn.style.color = '#475569';
    };

    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    `;

    btn.addEventListener('click', function() {
      const isLight = html.getAttribute('data-theme') === 'light';
      if (isLight) {
        html.removeAttribute('data-theme');
        localStorage.setItem(STORAGE_KEY, 'dark');
      } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem(STORAGE_KEY, 'light');
      }
    });
    return btn;
  }

  function injectToggle() {
    if (!document.getElementById('theme-toggle-btn')) {
      const toggle = buildToggle();
      document.body.appendChild(toggle);
    }
  }

  // React may not have rendered yet — retry with observer
  const observer = new MutationObserver(function() {
    if (document.body) {
      injectToggle();
      observer.disconnect();
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });
  // Also try immediately in case it's already rendered
  if (document.body) injectToggle();
})();
